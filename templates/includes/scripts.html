<!-- Script untuk menambahkan class active pada link sidebar yang sesuai dengan URL saat ini -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Ambil semua link di sidebar
    const links = document.querySelectorAll('.main-sidebar .nav-sidebar .nav-link');
    const currentUrl = window.location.href.split(/[?#]/)[0]; // URL tanpa query string

    links.forEach(link => {
        const href = link.getAttribute('href');
        if (!href || href === '#' || href === '') return; // Abaikan link kosong

        // Buat URL absolut untuk perbandingan
        const fullLinkHref = new URL(href, window.location.origin).href.split(/[?#]/)[0];

        if (fullLinkHref === currentUrl) {
            // Hapus class active dari semua link
            links.forEach(l => l.classList.remove('active'));
            
            // Tambah class active ke link yang sesuai
            link.classList.add('active');
            
            // Buka treeview parent jika ada
            const parentLi = link.closest('li.nav-item');
            if (parentLi) {
                // Cek apakah ini bagian dari treeview
                const parentTreeview = parentLi.closest('.nav-treeview');
                if (parentTreeview) {
                    // Buka parent menu (treeview)
                    const parentNavItem = parentTreeview.closest('li.nav-item');
                    if (parentNavItem) {
                        parentNavItem.classList.add('menu-open');
                        const parentLink = parentNavItem.querySelector('> .nav-link');
                        if (parentLink) {
                            parentLink.classList.add('active');
                        }
                    }
                }
            }
        }
    });
});
</script>

<!-- Script untuk animasi    preloader -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var preloader = document.getElementById('preloader');
        var mainContent = document.getElementById('main-content');

        // Total durasi animasi preloader (2 detik animasi + 0.5 detik delay teks)
        var animationDuration = 2500; // 2.5 detik
        
        setTimeout(function() {
            // Fade out preloader
            preloader.style.opacity = '0';
            // Fade in konten utama
            mainContent.style.opacity = '1';
            // Setelah transisi fade preloader selesai, sembunyikan dari tampilan
            setTimeout(function() {
                preloader.style.display = 'none';
            }, 500); // sama dengan durasi transition opacity preloader
        }, animationDuration);
    });
</script>
